<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍬 EYE KANDI Portal</title>
<style>
/* System fonts - no external dependencies */
:root{
  --candy:#FF2D78;--cl:rgba(255,45,120,0.12);
  --gold:#FFD166;--gl:rgba(255,209,102,0.12);
  --mint:#06D6A0;--ml:rgba(6,214,160,0.12);
  --sky:#60A5FA;--lav:#C084FC;--ora:#F97316;
  --bg:#07070E;--s1:#0F0F18;--s2:#15151F;--s3:#1B1B26;
  --bdr:rgba(255,255,255,0.06);--txt:#EDE8FF;--dim:#65657F;--mu:#3A3A55;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* AUTH */
#authWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(255,45,120,0.15) 0%,transparent 70%);}
.auth-box{width:380px;background:var(--s1);border:1px solid var(--bdr);border-radius:22px;
  padding:40px 36px;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,0.6);}
.auth-logo{font-size:42px;margin-bottom:12px;display:block;}
.auth-title{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.5px;}
.auth-sub{font-size:12px;color:var(--dim);margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:22px;gap:4px;}
.auth-tab{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--dim);transition:all .2s;}
.auth-tab.active{background:var(--s3);color:var(--txt);}
.af{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:11px;
  padding:12px 14px;color:var(--txt);font-size:13px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.af:focus{border-color:rgba(255,45,120,0.5);}
.af::placeholder{color:var(--mu);}
.auth-btn{width:100%;padding:13px;border-radius:11px;background:var(--candy);color:#fff;
  font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;margin-top:4px;letter-spacing:.2px;}
.auth-btn:hover{background:#e01f68;transform:translateY(-1px);}
.auth-btn:active{transform:translateY(0);}
.auth-err{background:rgba(255,45,120,0.1);border:1px solid rgba(255,45,120,0.3);
  color:#FF6FA6;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;display:none;text-align:left;}
.auth-creds{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 14px;font-size:11px;color:var(--dim);margin-top:16px;text-align:left;line-height:1.9;}
.auth-creds b{color:var(--txt);}

/* APP */
#appWrap{display:none;}
.topbar{position:sticky;top:0;z-index:200;background:rgba(7,7,14,0.95);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:14px;padding:12px 24px;}
.tbar-logo{display:flex;align-items:center;gap:9px;}
.tbar-name{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.tbar-role{font-size:10px;color:var(--dim);margin-top:1px;}
.tbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tbar-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
.tbar-uname{font-size:12px;font-weight:600;}
.tb-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.ba{background:rgba(255,209,102,.15);color:var(--gold);border:1px solid rgba(255,209,102,.25);}
.bc{background:var(--cl);color:#FF6FA6;border:1px solid rgba(255,45,120,.2);}
.bm{background:var(--ml);color:var(--mint);border:1px solid rgba(6,214,160,.2);}
.logout-btn{padding:6px 14px;border-radius:9px;background:var(--s2);border:1px solid var(--bdr);
  color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.logout-btn:hover{color:var(--txt);}

/* NAV */
.nav{display:flex;padding:0 24px;background:var(--s1);border-bottom:1px solid var(--bdr);overflow-x:auto;}
.nav-btn{padding:11px 16px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--dim);
  border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-btn:hover{color:var(--txt);}
.nav-btn.active{color:var(--candy);border-bottom-color:var(--candy);}

/* PAGES */
.page{display:none;padding:26px;max-width:1280px;margin:0 auto;}
.page.active{display:block;}

/* PRIMITIVES */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.pt{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.ps{font-size:11px;color:var(--dim);margin-top:3px;}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:20px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.card-title small{font-size:10px;font-weight:400;color:var(--dim);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr;}}

/* KPI */
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;padding:18px;
  position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--ac,var(--candy));opacity:.7;}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:8px;}
.kpi-val{font-size:28px;font-weight:800;line-height:1;}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:5px;}

/* NOTICE */
.notice{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.2);
  border-radius:11px;padding:12px 15px;font-size:12px;color:#c9a84c;line-height:1.6;
  display:flex;gap:9px;margin-bottom:18px;}

/* PERF TABLE */
.perf-wrap{overflow-x:auto;}
table.pt-t{width:100%;border-collapse:collapse;font-size:12px;}
table.pt-t th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--dim);
  text-transform:uppercase;letter-spacing:.06em;background:var(--s2);border-bottom:1px solid var(--bdr);}
table.pt-t td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
table.pt-t tr:last-child td{border-bottom:none;}
table.pt-t tr:hover td{background:var(--s2);}
.score-cell{display:flex;align-items:center;gap:8px;}
.score-bar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:50px;}
.score-fill{height:100%;border-radius:3px;}
.score-num{font-weight:700;font-size:11px;width:32px;text-align:right;}

/* COACHING */
.co-list{display:flex;flex-direction:column;gap:11px;}
.co-entry{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;}
.co-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background .15s;user-select:none;}
.co-hdr:hover{background:var(--s2);}
.co-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
.co-ename{font-weight:700;font-size:13px;}
.co-emeta{font-size:10.5px;color:var(--dim);margin-top:2px;}
.co-ebadges{margin-left:auto;display:flex;gap:5px;}
.cp{padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:700;}
.cp-pass{background:var(--ml);color:var(--mint);}
.cp-coach{background:var(--cl);color:#FF6FA6;}
.co-chev{color:var(--mu);font-size:16px;transition:transform .22s;margin-left:4px;}
.co-chev.open{transform:rotate(90deg);}
.co-body{display:none;padding:0 18px 18px;border-top:1px solid var(--bdr);}
.co-body.open{display:block;}
.co-sec{margin-top:14px;}
.co-sec-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.co-box{background:var(--s2);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--dim);line-height:1.65;}
.imp-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px;}
.imp-chip{background:rgba(255,45,120,.06);border:1px solid rgba(255,45,120,.13);border-radius:9px;padding:10px 12px;}
.imp-lbl{font-size:11px;font-weight:700;color:#FF6FA6;margin-bottom:3px;}
.imp-note{font-size:11px;color:var(--dim);line-height:1.5;}
.ac-list{display:flex;flex-direction:column;gap:6px;}
.ac-item{display:flex;gap:10px;align-items:flex-start;background:var(--s2);
  border-radius:8px;padding:9px 12px;font-size:11.5px;color:var(--dim);line-height:1.55;}
.ac-num{width:18px;height:18px;background:var(--cl);color:#FF6FA6;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;margin-top:2px;}
.commit-box{background:linear-gradient(135deg,rgba(6,214,160,.07),rgba(96,165,250,.05));
  border:1px solid rgba(6,214,160,.16);border-radius:10px;padding:12px 14px;margin-top:10px;}
.commit-lbl{font-size:9px;font-weight:700;color:var(--mint);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.commit-txt{font-size:12px;color:var(--dim);line-height:1.7;font-style:italic;}
.kpi-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.kp{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.kp-red{background:var(--cl);color:#FF6FA6;}
.kp-yellow{background:var(--gl);color:var(--gold);}
.kp-green{background:var(--ml);color:var(--mint);}

/* CHATTER CARDS */
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.cc{background:var(--s1);border:1px solid var(--bdr);border-left:3px solid var(--cc,var(--candy));
  border-radius:13px;padding:16px;transition:transform .2s;}
.cc:hover{transform:translateY(-2px);}
.cc-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.cc-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.cc-name{font-weight:800;font-size:14px;}
.cc-shift{font-size:10px;color:var(--dim);margin-top:1px;}
.cc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;text-align:center;}
.cc-stat{background:var(--s2);border-radius:8px;padding:7px 5px;}
.cc-stat-val{font-weight:800;font-size:14px;}
.cc-stat-lbl{font-size:9px;color:var(--dim);margin-top:1px;}
.cc-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.cc-bar-fill{height:100%;border-radius:2px;}

/* MODEL SALES */
.ms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.ms-card{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;padding:18px;
  text-align:center;transition:transform .2s;border-top:3px solid var(--mc,var(--candy));}
.ms-card:hover{transform:translateY(-2px);}
.ms-emoji{font-size:30px;margin-bottom:8px;}
.ms-name{font-weight:800;font-size:14px;margin-bottom:2px;}
.ms-rev{font-size:24px;font-weight:800;color:var(--gold);margin:6px 0 3px;}
.ms-sub{font-size:10px;color:var(--dim);}
.ms-bar-wrap{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:10px;}

/* CHECKLIST */
.cl-progress{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;padding:18px;margin-bottom:20px;}
.cl-progress-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cl-progress-title{font-size:13px;font-weight:700;}
.cl-pct{font-size:24px;font-weight:800;color:var(--mint);}
.cl-bar{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.cl-bar-fill{height:100%;background:linear-gradient(90deg,var(--mint),#06D6A055);border-radius:4px;transition:width .4s;}
.cl-section{margin-bottom:20px;}
.cl-sec-title{font-size:12px;font-weight:700;margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;}
.cl-item{display:flex;align-items:flex-start;gap:10px;background:var(--s2);border-radius:9px;
  padding:10px 13px;border:1px solid var(--bdr);cursor:pointer;transition:all .15s;
  user-select:none;margin-bottom:6px;}
.cl-item.done{background:rgba(6,214,160,.05);border-color:rgba(6,214,160,.15);}
.cl-check{width:18px;height:18px;border-radius:5px;border:2px solid rgba(255,255,255,.15);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.cl-item.done .cl-check{background:var(--mint);border-color:var(--mint);}
.cl-check-icon{color:#fff;font-size:10px;display:none;}
.cl-item.done .cl-check-icon{display:block;}
.cl-text{font-size:12.5px;color:var(--dim);line-height:1.5;flex:1;}
.cl-item.done .cl-text{color:var(--mu);text-decoration:line-through;}
.reset-btn{padding:6px 14px;border-radius:8px;background:var(--s2);border:1px solid var(--bdr);
  color:var(--dim);font-size:11px;cursor:pointer;transition:all .2s;}
.reset-btn:hover{color:var(--txt);}

/* SCHEDULE */
.sched-drop{border:2px dashed var(--bdr);border-radius:13px;padding:40px 32px;text-align:center;
  cursor:pointer;transition:all .2s;background:var(--s1);}
.sched-drop:hover,.sched-drop.drag{border-color:rgba(255,45,120,.4);background:rgba(255,45,120,.05);}
.sched-preview{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;}
.sched-preview-hdr{padding:13px 16px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;}
.sched-img{width:100%;max-height:600px;object-fit:contain;display:block;}

/* SOPs */
.sop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:20px;}
.sop-card{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;padding:16px;
  display:flex;flex-direction:column;gap:9px;transition:transform .2s;}
.sop-card:hover{transform:translateY(-2px);}
.sop-card.warn{border-color:rgba(255,209,102,.25);}
.sop-top{display:flex;align-items:flex-start;gap:10px;}
.sop-icon{width:36px;height:36px;border-radius:9px;background:var(--s2);display:flex;
  align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sop-name{font-weight:700;font-size:12.5px;margin-bottom:2px;}
.sop-type{font-size:9.5px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;}
.sop-note{font-size:11px;color:var(--dim);line-height:1.55;}
.sop-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;
  background:var(--s2);border:1px solid var(--bdr);color:var(--dim);font-size:11px;
  font-weight:600;text-decoration:none;transition:all .2s;width:fit-content;}
.sop-btn:hover{color:#FF6FA6;border-color:rgba(255,45,120,.3);background:var(--cl);}

/* SALES GUIDE */
.sv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px;margin-bottom:20px;}
.sv-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:14px;
  border-left:3px solid var(--svc,var(--bdr));}
.sv-card[data-s="valid"]{--svc:var(--mint);}
.sv-card[data-s="invalid"]{--svc:var(--candy);}
.sv-card[data-s="review"]{--svc:var(--gold);}
.sv-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.sv-scen{font-size:12.5px;font-weight:600;line-height:1.45;flex:1;}
.sv-badge{padding:2px 8px;border-radius:20px;font-size:9.5px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.sv-v{background:var(--ml);color:var(--mint);}
.sv-i{background:var(--cl);color:#FF6FA6;}
.sv-r{background:var(--gl);color:var(--gold);}
.sv-note{font-size:11px;color:var(--dim);line-height:1.6;background:var(--s2);border-radius:7px;padding:7px 10px;}

/* PPV */
.ppv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px;margin-bottom:20px;}
.ppv-card{background:var(--s1);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;}
.ppv-hdr{padding:12px 15px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;}
.ppv-mname{font-weight:800;font-size:13px;}
.ppv-malias{font-size:9.5px;color:var(--mu);margin-top:1px;}
.ppv-rule{font-size:10px;color:var(--mu);font-style:italic;padding:6px 15px 0;line-height:1.5;}
.ppv-sec{padding:10px 15px 0;}
.ppv-sec-lbl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.ppv-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02);gap:10px;}
.ppv-row:last-child{border-bottom:none;}
.ppv-item{font-size:11px;color:var(--dim);flex:1;line-height:1.4;}
.ppv-price{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap;}
.ppv-price.ask{color:var(--lav);}
.ppv-price.hi{color:#FF6FA6;}
.ppv-spacer{height:10px;}

/* FILTER ROW */
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fb{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--bdr);background:var(--s2);color:var(--dim);transition:all .2s;}
.fb:hover{color:var(--txt);}
.fb.active{background:var(--cl);color:#FF6FA6;border-color:rgba(255,45,120,.3);}

/* CHATTER SELECTOR */
.cs-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cs-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--bdr);background:var(--s2);color:var(--dim);transition:all .2s;}
.cs-btn:hover{color:var(--txt);}
.cs-btn.active{color:#fff;border-color:transparent;}

/* ANNOUNCEMENTS */
.ann-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.ann-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:16px;
  border-left:3px solid var(--anc,var(--candy));}
.ann-card.global{--anc:var(--gold);}
.ann-card.callout{--anc:var(--candy);}
.ann-card.info{--anc:var(--sky);}
.ann-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ann-title{font-weight:700;font-size:13px;}
.ann-date{font-size:10px;color:var(--mu);white-space:nowrap;}
.ann-body{font-size:12px;color:var(--dim);line-height:1.6;}
.ann-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9.5px;font-weight:700;margin-top:8px;}
.tag-global{background:var(--gl);color:var(--gold);}
.tag-callout{background:var(--cl);color:#FF6FA6;}
.tag-info{background:rgba(96,165,250,.12);color:var(--sky);}

/* REQUESTS */
.req-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.req-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:16px;}
.req-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.req-title{font-weight:700;font-size:13px;}
.req-status{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.st-new{background:rgba(96,165,250,.12);color:var(--sky);}
.st-pending{background:var(--gl);color:var(--gold);}
.st-approved{background:var(--ml);color:var(--mint);}
.st-done{background:rgba(255,255,255,.06);color:var(--dim);}
.st-rejected{background:var(--cl);color:#FF6FA6;}

.req-form{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:20px;}

.form-label{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em;}

.form-input:focus{border-color:rgba(255,45,120,.4);}
.form-textarea{resize:vertical;min-height:90px;font-family:inherit;}
.submit-btn{padding:10px 22px;border-radius:10px;background:var(--candy);color:#fff;

.submit-btn:hover{background:#e01f68;}

.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);max-height:700px;}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;

.ai-msg{max-width:80%;padding:12px 15px;border-radius:12px;font-size:13px;line-height:1.6;}
.ai-msg.user{background:var(--candy);color:#fff;margin-left:auto;border-radius:12px 12px 3px 12px;}
.ai-msg.bot{background:var(--s2);color:var(--txt);border-radius:12px 12px 12px 3px;}
.ai-msg.bot.thinking{color:var(--dim);font-style:italic;}
.ai-input-row{display:flex;gap:10px;background:var(--s2);border:1px solid var(--bdr);
  border-top:none;border-radius:0 0 14px 14px;padding:12px;}
.ai-input{flex:1;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;
  padding:10px 14px;color:var(--txt);font-size:13px;outline:none;font-family:inherit;}
.ai-input:focus{border-color:rgba(255,45,120,.4);}
.ai-send{padding:10px 20px;background:var(--candy);color:#fff;border:none;border-radius:10px;

.ai-send:hover{background:#e01f68;}
.ai-send:disabled{opacity:.5;cursor:not-allowed;}
.ai-key-note{font-size:11px;color:var(--mu);margin-bottom:10px;text-align:center;}

function authTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  id('loginForm').style.display=t==='login'?'block':'none';
  id('signupForm').style.display=t==='signup'?'block':'none';
  hideErr();
}
function showErr(m){const e=id('authErr');e.textContent=m;e.style.display='block';}
function hideErr(){id('authErr').style.display='none';}
function id(x){return document.getElementById(x);}

function doLogin(){
  const u=(id('lu').value||'').trim().toLowerCase();
  const p=(id('lp').value||'');
  if(!u||!p){showErr('Please fill in all fields.');return;}
  // Check hardcoded first
  const match = ACCOUNTS.find(a=>a.u.toLowerCase()===u && a.p===p);
  if(match){launchApp({username:match.u,role:match.role,chatterName:match.cn});return;}
  // Check extra signed-up accounts
  const match2 = EXTRA_ACCOUNTS.find(a=>a.username.toLowerCase()===u && a.password===p);
  if(match2){launchApp(match2);return;}
  showErr('Incorrect username or password.');
}

function doSignup(){
  const ch=id('sc').value, u=(id('su').value||'').trim(), p=id('sp').value, p2=id('sp2').value;
  if(!ch){showErr('Please select your chatter name.');return;}
  if(!u){showErr('Please choose a username.');return;}
  if(p.length<6){showErr('Password must be at least 6 characters.');return;}
  if(p!==p2){showErr('Passwords do not match.');return;}
  const all=[...ACCOUNTS,...EXTRA_ACCOUNTS];
  if(all.find(a=>(a.u||a.username||'').toLowerCase()===u.toLowerCase())){showErr('Username already taken.');return;}
  if(all.find(a=>(a.cn||a.chatterName)===ch&&a.role==='chatter')){showErr('This chatter already has an account.');return;}
  const newAcc={username:u,password:p,role:'chatter',chatterName:ch};
  EXTRA_ACCOUNTS.push(newAcc);
  launchApp(newAcc);
}

function doLogout(){
  CU=null;
  id('authWrap').style.display='flex';
  id('appWrap').style.display='none';
  ['lu','lp','su','sp','sp2'].forEach(x=>{const e=id(x);if(e)e.value='';});
  id('sc').value='';
  hideErr();
}

function launchApp(user){
  CU=user;
  id('authWrap').style.display='none';
  id('appWrap').style.display='block';
  const color=user.role==='admin'?'#FFD166':(COLORS[user.chatterName]||'#FF2D78');
  const av=id('topAv'); av.style.background=`linear-gradient(135deg,${color},${color}88)`; av.textContent=user.username[0].toUpperCase();
  id('topUname').textContent=user.username;
  id('topRole').textContent=user.role==='admin'?'Administrator':`Chatter · ${user.chatterName}`;
  id('topBadge').innerHTML=user.role==='admin'?'<span class="tb-badge ba">⭐ Admin</span>':'<span class="tb-badge bc">🍬 Chatter</span>';
  buildNav(user.role);
  buildPages(user.role,user.chatterName);
  switchPage('dashboard');
}

// NAV

function buildNav(role){
  const pages=role==='admin'
    ?[{id:'dashboard',l:'📊 Overview'},{id:'chatters',l:'👥 Chatters'},{id:'performance',l:'📈 Performance'},{id:'coaching',l:'🎯 Coaching'},{id:'model_sales',l:'💸 Model Sales'},{id:'announcements',l:'📣 Announcements'},{id:'requests',l:'🎫 Requests'},{id:'checklist',l:'✅ Checklist'},{id:'schedule',l:'📅 Schedule'},{id:'sops',l:'📋 SOPs'},{id:'sales_ref',l:'💲 Sales Guide'},{id:'ppv',l:'💰 PPV Pricing'},{id:'ai',l:'🤖 AI Assistant'}]
    :[{id:'dashboard',l:'📊 My Dashboard'},{id:'performance',l:'📈 Performance'},{id:'coaching',l:'🎯 My Coaching'},{id:'announcements',l:'📣 Announcements'},{id:'requests',l:'🎫 Requests'},{id:'checklist',l:'✅ Checklist'},{id:'schedule',l:'📅 Schedule'},{id:'sops',l:'📋 SOPs'},{id:'sales_ref',l:'💲 Sales Guide'},{id:'ppv',l:'💰 PPV Pricing'},{id:'ai',l:'🤖 AI Assistant'}];
  id('navBar').innerHTML=pages.map(p=>`<button class="nav-btn" id="nav-${p.id}" onclick="switchPage('${p.id}')">${p.l}</button>`).join('');
}

function switchPage(pid){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const nb=id('nav-'+pid), pg=id('page-'+pid);
  if(nb)nb.classList.add('active');
  if(pg)pg.classList.add('active');
}

    c.appendChild(pAdminChatters());
    c.appendChild(pAdminPerf());
    c.appendChild(pAdminCoaching());
    c.appendChild(pModelSales());

    c.appendChild(pRequests(role,cn));
    c.appendChild(pChecklist('admin'));
    c.appendChild(pSchedule());
    c.appendChild(pSOPs());
    c.appendChild(pSalesRef());
    c.appendChild(pPPV());
    c.appendChild(pAI());
  } else {
    c.appendChild(pChatterDash(cn));
    c.appendChild(pChatterPerf(cn));
    c.appendChild(pChatterCoaching(cn));
    c.appendChild(pAnnouncements(role,cn));
    c.appendChild(pRequests(role,cn));
    c.appendChild(pChecklist(cn));
    c.appendChild(pSchedule());
    c.appendChild(pSOPs());

window.submitRequest=(cn,role)=>{
  const t=id('req_title').value.trim(), d=id('req_desc').value.trim(), cat=id('req_cat').value;
  if(!t||!d){alert('Please fill in title and description.');return;}
  const req={id:'REQ-'+String(REQUESTS.length+1).padStart(3,'0'),title:t,role,by:cn,category:cat,
    status:'new',priority:'medium',date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),desc:d};
  REQUESTS.push(req);
  const card=`<div class="req-card"><div class="req-hdr"><div class="req-title">${t}</div><span class="req-status st-new">NEW</span></div><div class="req-meta">${req.id} · ${cat} · ${req.date} · Submitted by: <b>${cn}</b></div><div class="req-body">${d}</div></div>`;
  id('reqList').insertAdjacentHTML('afterbegin',card);
  id('req_title').value=''; id('req_desc').value='';

window.updateReqStatus=(reqId,status)=>{
  if(!status)return;
  const req=REQUESTS.find(r=>r.id===reqId);
  if(req){req.status=status; alert(`Request ${reqId} updated to: ${status.toUpperCase()}`);}
};

// ─── CHECKLIST ───
function pChecklist(cn){
  const p=mkPage('checklist');
  const sk='ek_cl_'+cn;
  const state={};

  function render(){
    let total=0,done=0;
    Object.values(CHECKLIST).forEach(items=>items.forEach(()=>total++));
    Object.keys(state).forEach(k=>{if(state[k])done++;});
    const pct=total?Math.round((done/total)*100):0;

    const section=(title,icon,items,key)=>`
      <div class="cl-section">
        <div class="cl-sec-title">${icon} ${title}</div>
        ${items.map((item,i)=>{
          const iid=`${key}_${i}`, isDone=!!state[iid];
          return`<div class="cl-item${isDone?' done':''}" onclick="toggleCL_${cn.replace(/[^a-z]/gi,'')}('${iid}')">
            <div class="cl-check"><span class="cl-check-icon">✓</span></div>
            <div class="cl-text">${item}</div>
          </div>`;}).join('')}
      </div>`;

    p.innerHTML=`
    <div class="ph"><div><div class="pt">✅ Shift Checklist</div><div class="ps">${cn} · Resets manually each shift</div></div></div>
    <div class="cl-progress">
      <div class="cl-progress-hdr">
        <div class="cl-progress-title">Shift Progress</div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="reset-btn" onclick="resetCL_${cn.replace(/[^a-z]/gi,'')}()">Reset</button>
          <div class="cl-pct">${pct}%</div>
        </div>
      </div>
      <div class="cl-bar"><div class="cl-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--dim);margin-top:8px">${done} of ${total} tasks completed</div>
    </div>
    ${section('Pre-Shift','🌅',CHECKLIST.pre,'pre')}
    ${section('During Shift','⚡',CHECKLIST.during,'during')}
    ${section('Post-Shift','🌙',CHECKLIST.post,'post')}`;
  }

  const safeCn=cn.replace(/[^a-z]/gi,'');
  window[`toggleCL_${safeCn}`]=(iid)=>{state[iid]=!state[iid]; render();};
  window[`resetCL_${safeCn}`]=()=>{if(confirm("Reset all checklist items?")){Object.keys(state).forEach(k=>delete state[k]);render();}};
  render();
  return p;
}

window.sendAI=async()=>{
  const input=id('aiInput'), msgs=id('aiMessages'), btn=id('aiSendBtn');
  const apiKey=(id('aiKey').value||S.get('ek_ai_key')||'').trim();
  const text=input.value.trim();
  if(!text)return;
  if(!apiKey){msgs.innerHTML+='<div class="ai-msg bot">⚠️ Please paste your Anthropic API key above to use the AI assistant.</div>';msgs.scrollTop=msgs.scrollHeight;return;}

  // Save key for session
  S.set('ek_ai_key',apiKey);

  msgs.innerHTML+=`<div class="ai-msg user">${text}</div>`;
  msgs.innerHTML+='<div class="ai-msg bot thinking" id="aiThinking">Thinking...</div>';
  msgs.scrollTop=msgs.scrollHeight;
  input.value=''; btn.disabled=true;

  // Build context
  const context=`You are an AI assistant for EYE KANDI, an OnlyFans agency. Here is current data:
CHATTERS: ${Object.keys(PERF).join(', ')}
PERFORMANCE SCORES (latest QA): ${Object.entries(PERF).map(([n,d])=>`${n}:${d.latestScore}`).join(', ')}
MMS STATS: ${Object.entries(PERF).map(([n,d])=>`${n}:${d.mms.total} submitted,${d.mms.approved} approved,${d.mms.pending} pending`).join(' | ')}
MODELS: ${MODELS.map(m=>`${m.id}($${m.rev.toLocaleString()})`).join(', ')}
ACTIVE CAMPAIGN: Truth or Dare (ongoing)
OPEN REQUESTS: ${REQUESTS.filter(r=>r.status==='new'||r.status==='pending').length} open
Answer helpfully and concisely. Use data above when relevant.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:context,messages:[{role:'user',content:text}]})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Sorry, I could not get a response.';
    id('aiThinking').remove();
    msgs.innerHTML+=`<div class="ai-msg bot">${reply.replace(/\n/g,'<br>')}</div>`;
  }catch(e){
    id('aiThinking').remove();
    msgs.innerHTML+=`<div class="ai-msg bot">⚠️ Error: ${e.message}. Check your API key and internet connection.</div>`;
  }
  btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
};
